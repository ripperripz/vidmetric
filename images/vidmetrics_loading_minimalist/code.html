<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VidMetrics | Analyzing Intelligence</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&amp;family=Instrument+Serif:ital@0;1&amp;family=Geist+Mono:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "error-container": "#93000a",
            "surface-container-low": "#191b21",
            "on-primary-container": "#00236b",
            "surface": "#111319",
            "on-error": "#690005",
            "on-tertiary-container": "#232a39",
            "primary-fixed": "#dbe1ff",
            "inverse-on-surface": "#2e3036",
            "on-tertiary": "#293040",
            "surface-tint": "#b4c5ff",
            "tertiary": "#bfc6da",
            "surface-container-high": "#282a30",
            "primary": "#b4c5ff",
            "on-primary": "#002979",
            "outline-variant": "#434654",
            "secondary-fixed-dim": "#3edeb1",
            "inverse-surface": "#e2e2e9",
            "on-secondary-fixed": "#002117",
            "primary-fixed-dim": "#b4c5ff",
            "on-secondary": "#003829",
            "background": "#080a0f",
            "inverse-primary": "#1754d4",
            "on-error-container": "#ffdad6",
            "on-secondary-fixed-variant": "#00513d",
            "surface-bright": "#37393f",
            "secondary": "#42e1b3",
            "primary-container": "#628aff",
            "error": "#ffb4ab",
            "surface-dim": "#111319",
            "secondary-fixed": "#63fccc",
            "on-secondary-container": "#004b39",
            "surface-variant": "#33353a",
            "on-surface-variant": "#c3c6d7",
            "on-primary-fixed": "#00174c",
            "secondary-container": "#00c599",
            "on-primary-fixed-variant": "#003daa",
            "surface-container": "#1e1f25",
            "on-tertiary-fixed-variant": "#404757",
            "on-background": "#e2e2e9",
            "outline": "#8d90a0",
            "tertiary-fixed-dim": "#bfc6da",
            "tertiary-container": "#8a91a3",
            "surface-container-lowest": "#0c0e13",
            "on-tertiary-fixed": "#141b2a",
            "tertiary-fixed": "#dbe2f7",
            "surface-container-highest": "#33353a",
            "on-surface": "#e2e2e9"
          },
          fontFamily: {
            "headline": ["Instrument Serif", "serif"],
            "body": ["Inter", "sans-serif"],
            "mono": ["Geist Mono", "monospace"]
          },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },
    }
  </script>
<style>
    body {
      background-color: #080A0F;
      color: #e2e2e9;
      font-family: 'Inter', sans-serif;
    }
    .instrument-italic {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
    }
    .geist-mono {
      font-family: 'Geist Mono', monospace;
      letter-spacing: -0.02em;
    }
    /* Animated Circular Progress Simulation */
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .loader-ring {
      border: 2px solid transparent;
      border-top-color: #b4c5ff;
      border-right-color: rgba(180, 197, 255, 0.1);
      border-radius: 50%;
      animation: spin-slow 1.5s linear infinite;
    }
    .glow-pulse {
      box-shadow: 0 0 40px rgba(79, 126, 255, 0.15);
    }
    /* Simple CSS cycle simulation for static generation */
    @keyframes fadeText {
      0%, 30% { opacity: 1; transform: translateY(0); }
      33%, 100% { opacity: 0; transform: translateY(-10px); }
    }
    .cycling-text {
      animation: fadeText 4s infinite linear;
    }
  </style>
</head>
<body class="bg-background min-h-screen flex flex-col items-center justify-between overflow-hidden">
<!-- Background Texture -->
<div class="fixed inset-0 pointer-events-none opacity-20" style="background-image: radial-gradient(circle at 50% 50%, #003daa 0%, transparent 70%);">
</div>
<!-- Top Brand Anchor (Hidden but present for layout consistency) -->
<div class="w-full flex justify-between items-center px-8 h-16 z-10">
<span class="text-xl font-bold tracking-tighter text-slate-100 uppercase geist-mono opacity-40">VidMetrics</span>
<div class="h-[1px] flex-grow mx-8 bg-white/5"></div>
<span class="geist-mono text-[10px] text-slate-500 tracking-[0.3em] uppercase">Status: Engine Active</span>
</div>
<!-- Main Central Loader Content -->
<main class="flex flex-col items-center justify-center flex-grow relative z-10 text-center px-6">
<!-- Circular Indicator -->
<div class="relative w-32 h-32 mb-12 flex items-center justify-center">
<!-- Exterior Glow -->
<div class="absolute inset-0 rounded-full blur-2xl bg-primary/10"></div>
<!-- Rotating Ring -->
<div class="absolute inset-0 loader-ring w-full h-full"></div>
<!-- Static Inner Core -->
<div class="w-24 h-24 rounded-full border border-white/5 flex items-center justify-center bg-surface-container-lowest/50 backdrop-blur-md">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">
          monitoring
        </span>
</div>
</div>
<!-- Textual Intelligence Brief -->
<div class="space-y-4 max-w-lg">
<h1 class="instrument-italic text-5xl md:text-6xl text-on-surface tracking-tight">
        Analyzing @MrBeast
      </h1>
<div class="h-6 overflow-hidden">
<!-- In a real app, this would be JS driven. Here we use CSS animation for the mock. -->
<p class="geist-mono text-[12px] uppercase tracking-[0.2em] text-primary/80 cycling-text">
          Fetching most recent videos...
        </p>
</div>
<!-- Detail Brief Snippet -->
<div class="mt-8 grid grid-cols-1 gap-4 opacity-40">
<div class="bg-surface-container-low p-4 rounded-lg flex items-center gap-4 text-left border border-white/5">
<div class="w-1 h-8 bg-primary/30"></div>
<div>
<p class="geist-mono text-[10px] uppercase text-slate-500">Source</p>
<p class="body-md font-medium">YouTube Data API V3</p>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Fixed Progress Section -->
<footer class="w-full max-w-2xl px-8 pb-16 z-10 space-y-6">
<div class="space-y-3">
<div class="flex justify-between items-end geist-mono text-[10px] uppercase tracking-widest text-slate-500">
<div class="flex items-center gap-2">
<span class="text-primary">02</span>
<span>Engine: Neural_v4</span>
</div>
<div class="text-right">
          74% Complete
        </div>
</div>
<!-- Progress Bar -->
<div class="h-[2px] w-full bg-white/5 overflow-hidden">
<div class="h-full bg-primary transition-all duration-1000 ease-out" style="width: 74%;"></div>
</div>
</div>
<div class="flex justify-between items-center text-slate-600 geist-mono text-[9px] uppercase tracking-[0.2em]">
<span>Latency: 42ms</span>
<span class="text-slate-400">This takes about 4 seconds</span>
<span>Cluster: US-EAST-1</span>
</div>
</footer>
<!-- Decorative Corner Accents -->
<div class="fixed bottom-0 left-0 p-8 pointer-events-none opacity-20">
<div class="w-12 h-12 border-l border-b border-white/40"></div>
</div>
<div class="fixed top-0 right-0 p-8 pointer-events-none opacity-20">
<div class="w-12 h-12 border-r border-t border-white/40"></div>
</div>
</body></html>
