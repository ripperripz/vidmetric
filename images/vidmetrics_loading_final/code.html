<style>
        .dot-grid {
            background-image: radial-gradient(circle, #1E2433 1px, transparent 1px);

        }

            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: conic-gradient(#4F7EFF 266deg, transparent 0deg);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .circular-progress::before {
            content: "";
            position: absolute;
            width: 236px;
            height: 236px;
            border-radius: 50%;
            background: #080A0F;
        }
        .glow-pulse {
            box-shadow: 0 0 40px rgba(79, 126, 255, 0.15);

<body class="bg-background text-on-background font-body overflow-hidden selection:bg-primary/30">
<!-- Backdrop with Dot Grid -->
<div class="fixed inset-0 dot-grid opacity-40 pointer-events-none"></div>
