<main class="min-h-screen flex flex-col items-center justify-center px-6 relative editorial-gradient overflow-hidden">

<div class="h-0.5 w-8 bg-primary rounded-full"></div>

<div class="w-full max-w-2xl text-center space-y-12 relative z-10">
<header class="space-y-4">
<h1 class="text-5xl md:text-7xl font-headline italic tracking-tight text-white">
                    Paste a channel.
                </h1>
<p class="text-outline text-lg md:text-xl font-light tracking-tight">
                    That's it. Your intelligence brief is ready in seconds.
                </p>
</header>
<!-- Search Container -->
<div class="group relative">
<div class="bg-surface-container-lowest p-2 rounded-xl flex items-center shadow-2xl ring-1 ring-white/10 focus-within:ring-primary/40 transition-all duration-300">
<div class="pl-4 flex items-center text-outline">
<span class="material-symbols-outlined text-2xl" data-icon="link">link</span>
</div>
<input class="w-full bg-transparent border-none focus:ring-0 text-lg md:text-xl py-4 px-4 text-on-surface placeholder:text-outline/50 font-body" placeholder="youtube.com/@channelname" type="text"/>
<button class="bg-primary hover:bg-primary-container text-on-primary font-semibold px-8 py-4 rounded-lg transition-all duration-200 active:scale-95 shadow-lg flex items-center gap-2 group-hover:shadow-primary/20">
<span>Analyze</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Glow Effect -->
<div class="absolute -inset-1 bg-gradient-to-r from-primary/20 to-secondary/20 rounded-xl blur-xl opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
</div>
<!-- Suggestions -->
<div class="flex flex-col items-center gap-4">
<span class="text-outline-variant text-[10px] uppercase tracking-[0.2em] font-bold">Quick Start Benchmarks</span>
<div class="flex flex-wrap justify-center gap-3">
<button class="px-5 py-2 rounded-full bg-surface-container-low text-outline hover:text-on-surface hover:bg-surface-container-high transition-all border border-white/5 text-sm font-medium flex items-center gap-2">
<span class="text-primary opacity-60">@</span>MrBeast
                    </button>
<button class="px-5 py-2 rounded-full bg-surface-container-low text-outline hover:text-on-surface hover:bg-surface-container-high transition-all border border-white/5 text-sm font-medium flex items-center gap-2">
<span class="text-primary opacity-60">@</span>MKBHD
                    </button>

<span class="text-primary opacity-60">@</span>LexFridman
                    </button>
</div>
</div>
</div>
<!-- Intelligence Meta Info -->
<div class="absolute bottom-12 w-full px-12 flex justify-between items-end opacity-40 mix-blend-screen hidden md:flex">
<div class="space-y-1">
<p class="font-mono text-[10px] text-outline uppercase tracking-widest">System Status</p>
<div class="flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-secondary"></span>
<p class="font-mono text-xs text-on-surface">NODE_ACTIVE // LATENCY 24MS</p>
</div>
</div>

<a class="hover:text-primary transition-colors" href="#">Enterprise</a>
