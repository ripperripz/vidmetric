<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=Inter:wght@400;500;600&amp;family=Geist+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "outline": "#8d90a0",
                "surface-variant": "#33353a",
                "on-secondary-container": "#004b39",
                "on-primary": "#002979",
                "secondary-container": "#00c599",
                "error-container": "#93000a",
                "tertiary-container": "#8a91a3",
                "inverse-on-surface": "#2e3036",
                "surface-container-lowest": "#0c0e13",
                "primary-fixed": "#dbe1ff",
                "primary": "#b4c5ff",
                "on-secondary-fixed-variant": "#00513d",
                "on-secondary-fixed": "#002117",
                "background": "#111319",
                "on-tertiary": "#293040",
                "on-background": "#e2e2e9",
                "secondary-fixed-dim": "#3edeb1",
                "primary-container": "#628aff",
                "outline-variant": "#434654",
                "surface-container-low": "#191b21",
                "surface-bright": "#37393f",
                "primary-fixed-dim": "#b4c5ff",
                "surface": "#111319",
                "tertiary": "#bfc6da",
                "on-tertiary-fixed-variant": "#404757",
                "on-secondary": "#003829",
                "on-primary-fixed-variant": "#003daa",
                "on-error-container": "#ffdad6",
                "on-error": "#690005",
                "tertiary-fixed-dim": "#bfc6da",
                "surface-tint": "#b4c5ff",
                "on-primary-fixed": "#00174c",
                "surface-container-high": "#282a30",
                "inverse-surface": "#e2e2e9",
                "secondary": "#42e1b3",
                "on-tertiary-container": "#232a39",
                "on-primary-container": "#00236b",
                "surface-dim": "#111319",
                "surface-container-highest": "#33353a",
                "error": "#ffb4ab",
                "surface-container": "#1e1f25",
                "inverse-primary": "#1754d4",
                "tertiary-fixed": "#dbe2f7",
                "on-tertiary-fixed": "#141b2a",
                "on-surface-variant": "#c3c6d7",
                "secondary-fixed": "#63fccc",
                "on-surface": "#e2e2e9"
              },
              fontFamily: {
                "headline": ["Instrument Serif", "serif"],
                "body": ["Inter", "sans-serif"],
                "label": ["Inter", "sans-serif"],
                "mono": ["Geist Mono", "monospace"]
              },
              borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
            },
          },
        }
    </script>
<style>
        .blueprint-grid {
            background-image: 
                linear-gradient(to right, rgba(180, 197, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(180, 197, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .dot-grid {
            background-image: radial-gradient(#1E2433 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-gradient {
            background: radial-gradient(circle at center, rgba(180, 197, 255, 0.04) 0%, transparent 70%);
        }
        .input-glow:focus-within {
            box-shadow: 0 0 15px rgba(180, 197, 255, 0.1);
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface font-body selection:bg-primary selection:text-on-primary antialiased">
<main class="flex min-h-screen">
<!-- LEFT SIDE: Brand Moment (60%) -->
<section class="hidden lg:flex lg:w-[62%] relative bg-[#080A0F] overflow-hidden flex-col items-center justify-between py-16 px-12 border-r border-outline-variant/10">
<!-- Background Texture -->
<div class="absolute inset-0 dot-grid opacity-60"></div>
<div class="absolute inset-0 blueprint-grid"></div>
<div class="absolute inset-0 editorial-gradient"></div>
<!-- Logo Mark -->
<div class="relative z-10 flex flex-col items-center">
<div class="w-16 h-16 mb-4 bg-surface-container flex items-center justify-center rounded-xl border border-outline-variant/20 shadow-2xl">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="analytics" style="font-variation-settings: 'FILL' 1;">analytics</span>
</div>
<h1 class="font-headline italic text-xl text-primary tracking-tight">VidMetrics</h1>
</div>
<!-- Central Editorial Statement -->
<div class="relative z-10 w-full max-w-2xl text-center space-y-12">
<div class="space-y-6">
<h2 class="font-headline italic text-[56px] lg:text-[68px] leading-[1.05] text-on-surface">
                    Intelligence is your <br/>
<span class="text-primary">unfair advantage.</span>
</h2>
<div class="h-px w-32 bg-gradient-to-r from-transparent via-primary/40 to-transparent mx-auto"></div>
</div>
</div>
<!-- Social Proof Stats -->
<div class="relative z-10 flex items-center gap-x-12 opacity-80">
<div class="flex flex-col items-center">
<span class="font-mono text-[10px] uppercase tracking-[0.2em] text-outline">10k+ Channels</span>
</div>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant/40"></div>
<div class="flex flex-col items-center">
<span class="font-mono text-[10px] uppercase tracking-[0.2em] text-outline">50M+ Videos</span>
</div>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant/40"></div>
<div class="flex flex-col items-center">
<span class="font-mono text-[10px] uppercase tracking-[0.2em] text-outline">200+ Teams</span>
</div>
</div>
<!-- Background Visual Element -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[140px] pointer-events-none"></div>
</section>
<!-- RIGHT SIDE: Form (38%) -->
<section class="flex-1 lg:w-[38%] bg-[#0B0D12] flex items-center justify-center px-8 lg:px-16 py-12">
<div class="w-full max-w-[340px] space-y-10">
<!-- Header -->
<header class="space-y-3">
<h3 class="text-3xl font-medium text-on-surface tracking-tight">Welcome back</h3>
<p class="text-[15px] text-outline leading-relaxed">Please enter your credentials to access your workspace.</p>
</header>
<!-- Form -->
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="sr-only" for="email">Email address</label>
<div class="relative group input-glow rounded-xl transition-all">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors text-[18px]" data-icon="mail">mail</span>
<input class="w-full h-12 bg-surface-container border border-outline-variant/20 rounded-xl pl-11 pr-4 text-on-surface placeholder:text-outline/40 focus:ring-0 focus:border-primary/50 outline-none transition-all text-sm" id="email" placeholder="Email address" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="sr-only" for="password">Password</label>
<div class="relative group input-glow rounded-xl transition-all">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors text-[18px]" data-icon="lock">lock</span>
<input class="w-full h-12 bg-surface-container border border-outline-variant/20 rounded-xl pl-11 pr-11 text-on-surface placeholder:text-outline/40 focus:ring-0 focus:border-primary/50 outline-none transition-all text-sm" id="password" placeholder="Password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end pt-1">
<a class="text-[13px] text-primary/80 hover:text-primary transition-colors font-medium tracking-wide" href="#">Forgot password?</a>
</div>
<!-- Submit Button -->
<button class="w-full h-12 bg-primary hover:bg-primary-container text-on-primary font-semibold rounded-xl transition-all active:scale-[0.98] shadow-lg shadow-primary/10 mt-2" type="submit">
                    Sign in
                </button>
</form>
<!-- Divider -->
<div class="relative flex items-center gap-4">
<div class="h-px flex-1 bg-outline-variant/10"></div>
<span class="text-[10px] uppercase tracking-[0.2em] text-outline/50 font-semibold">Or</span>
<div class="h-px flex-1 bg-outline-variant/10"></div>
</div>
<!-- SSO Options -->
<div class="space-y-4">
<button class="w-full h-12 bg-surface-container border border-outline-variant/20 hover:border-outline-variant/40 hover:bg-surface-container-high text-on-surface rounded-xl transition-all flex items-center justify-center gap-3">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-medium tracking-wide">Continue with Google</span>
</button>
</div>
<!-- Footer Link -->
<footer class="text-center pt-2">
<p class="text-[14px] text-outline">
                    New to VidMetrics? 
                    <a class="text-primary hover:text-primary-container font-medium ml-1 transition-colors" href="#">Create account</a>
</p>
</footer>
</div>
</section>
</main>
<!-- Decorative Grain -->
<div class="fixed inset-0 pointer-events-none opacity-[0.02] mix-blend-overlay">
<svg viewbox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<filter id="noise">
<feturbulence basefrequency="0.65" numoctaves="3" stitchtiles="stitch" type="fractalNoise"></feturbulence>
</filter>
<rect filter="url(#noise)" height="100%" width="100%"></rect>
</svg>
</div>
</body></html>
